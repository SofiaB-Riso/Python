<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">Painel de Tarefas</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                {% if session.get('usuario_id') %}
                <li class="nav-item"><a class="nav-link" href="{{ url_for('nova_tarefa') }}">Nova Tarefa</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Sair</a></li>
                {% else %}
                <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('registro') }}">Registrar</a></li>
                {% endif %}
            </ul>

            <button id="toggle-dark" class="btn btn-outline-light ms-2">🌙</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const body = document.body;
    const toggle = document.getElementById("toggle-dark");

    if (localStorage.getItem("darkMode") === "true") {
        body.classList.add("bg-dark", "text-light");
    }

    toggle.addEventListener("click", function() {
        body.classList.toggle("bg-dark");
        body.classList.toggle("text-light");

        localStorage.setItem("darkMode", body.classList.contains("bg-dark"));
    });
});
</script>
</body>
</html>
